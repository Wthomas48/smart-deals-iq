<!doctype html>
<html lang="en">
  <head>
    <title>Payment Successful - SmartDealsIQ</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8f9fa;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 40px 32px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      }
      .icon {
        width: 72px;
        height: 72px;
        background: #10b981;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
      .icon svg { width: 36px; height: 36px; }
      h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
      p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 24px; }
      .steps {
        background: #f0fdf4;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 24px;
        text-align: left;
      }
      .steps h3 { font-size: 14px; font-weight: 700; color: #166534; margin-bottom: 10px; }
      .steps ol { padding-left: 20px; }
      .steps li { font-size: 13px; color: #444; padding: 3px 0; }
      .btn {
        display: block;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        margin-bottom: 10px;
      }
      .btn-primary { background: #6366f1; color: #fff; }
      .btn-outline { background: transparent; color: #6366f1; border: 2px solid #6366f1; }
      .btn:hover { opacity: 0.9; }

      @media (prefers-color-scheme: dark) {
        body { background: #0f0f14; color: #e0e0e0; }
        .card { background: #1a1a24; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
        p { color: #999; }
        .steps { background: #1a2e1a; }
        .steps h3 { color: #4ade80; }
        .steps li { color: #bbb; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h1>Payment Successful!</h1>
      <p>Thank you for your purchase. Your subscription is being activated now.</p>

      <div class="steps">
        <h3>Next Steps:</h3>
        <ol>
          <li>Open the SmartDealsIQ app</li>
          <li>Go to your <strong>Pricing</strong> screen</li>
          <li>Tap <strong>"Refresh Status"</strong></li>
          <li>Your new features will be unlocked!</li>
        </ol>
      </div>

      <a href="smartdealsiq://" class="btn btn-primary">Open SmartDealsIQ App</a>
      <a href="/vendor/billing" class="btn btn-outline">Back to Billing</a>
    </div>
  </body>
</html>
