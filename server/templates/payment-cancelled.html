<!doctype html>
<html lang="en">
  <head>
    <title>Payment Cancelled - SmartDealsIQ</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f8f9fa;
        color: #1a1a2e;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 40px 32px;
        max-width: 420px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      }
      .icon {
        width: 72px;
        height: 72px;
        background: #f59e0b;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
      }
      .icon svg { width: 36px; height: 36px; }
      h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
      p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 24px; }
      .btn {
        display: block;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        margin-bottom: 10px;
      }
      .btn-primary { background: #6366f1; color: #fff; }
      .btn-outline { background: transparent; color: #6366f1; border: 2px solid #6366f1; }
      .btn:hover { opacity: 0.9; }

      @media (prefers-color-scheme: dark) {
        body { background: #0f0f14; color: #e0e0e0; }
        .card { background: #1a1a24; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
        p { color: #999; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </div>
      <h1>Payment Cancelled</h1>
      <p>No worries! No charges were made. You can try again whenever you're ready.</p>

      <a href="/vendor/billing" class="btn btn-primary">Back to Plans</a>
      <a href="smartdealsiq://" class="btn btn-outline">Return to App</a>
    </div>
  </body>
</html>
